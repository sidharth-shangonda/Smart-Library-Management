<svg xmlns="http://www.w3.org/2000/svg" width="120" height="180" viewBox="0 0 120 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#183153;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b75d0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Book body -->
  <rect width="120" height="180" rx="4" ry="4" fill="url(#bg)"/>
  <!-- Spine line -->
  <rect x="0" y="0" width="10" height="180" fill="rgba(0,0,0,0.25)" rx="4"/>
  <!-- Decorative lines -->
  <rect x="20" y="30" width="80" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="20" y="42" width="55" height="2" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Book icon -->
  <text x="60" y="105" font-size="40" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="serif">📖</text>
  <!-- Bottom lines -->
  <rect x="20" y="140" width="80" height="2" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="20" y="150" width="60" height="2" rx="2" fill="rgba(255,255,255,0.15)"/>
</svg>
